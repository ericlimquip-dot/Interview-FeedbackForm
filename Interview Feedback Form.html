<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hiring Manager Feedback Form — MSBU</title>
<style>
  :root{
    --bg:#ededed; --card:#ffffff; --ink:#3b3b3b; --ink-strong:#2b2b2b;
    --muted:#9aa0a6; --muted2:#b7bcc2; --line:#e6e6e6; --line2:#eaeaea;
    --brand:#5153ff; --brand-dark:#4244e0; --accent-line:#4b6bfb;
    --red:#f0554d; --ok:#2e9e6b; --field-bg:#f6f7f8;
    --radius:6px; --shadow:0 1px 2px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:15px}
  .wrap{max-width:940px;margin:0 auto;padding:20px 18px 120px}
  header.app{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;color:var(--ink-strong)}
  .logo .badge{background:var(--brand);color:#fff;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:13px}
  .tabs{display:flex;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .tabs button{border:0;background:#fff;padding:8px 16px;font:inherit;font-weight:600;color:var(--muted);cursor:pointer;font-size:14px}
  .tabs button.active{background:var(--brand);color:#fff}
  .icon-btn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 14px;font:inherit;font-weight:600;
            color:var(--ink);cursor:pointer;font-size:14px}
  .icon-btn:hover{background:#f7f7f7}

  /* cards */
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
        box-shadow:var(--shadow);padding:24px 26px;margin-bottom:16px}
  .card.eval{border-left:none}
  .heading-line{border-bottom:1px solid var(--line2);padding-bottom:12px;margin-bottom:0}

  /* editable doc title / instructions */
  .doc-title{width:100%;border:0;font-size:26px;font-weight:800;color:var(--ink-strong);padding:2px 0 12px;
             border-bottom:1px solid var(--line2);background:transparent}
  .doc-title:focus{outline:none;border-bottom-color:var(--brand)}
  .hint{font-size:12.5px;color:var(--muted);margin:14px 0 2px}
  .doc-instructions{width:100%;border:0;font-size:16px;color:var(--ink);resize:vertical;min-height:26px;background:transparent;font-family:inherit}
  .doc-instructions:focus{outline:none}

  .q-title-static{font-size:17px;font-weight:800;color:var(--ink-strong);margin:0 0 12px;padding-bottom:12px;border-bottom:1px solid var(--line2)}
  .instr-static{font-size:16px;color:var(--ink);margin:0}

  /* right-side controls on each card */
  .card-controls{position:absolute;top:18px;right:18px;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .ctrl-row{display:flex;gap:8px;align-items:center}
  .kebab,.arrow,.grip{border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;
        width:30px;height:26px;border-radius:6px;display:grid;place-items:center;font-size:16px;line-height:1}
  .kebab:hover,.arrow:hover,.grip:hover{background:#f2f2f2;color:var(--ink)}
  .arrow{border:1px solid var(--line);height:30px;width:34px;font-size:14px}
  .grip{cursor:grab;font-size:15px;letter-spacing:1px}
  .req-badge{background:var(--red);color:#fff;width:30px;height:30px;border-radius:6px;display:grid;place-items:center;font-weight:800}
  .lock{color:var(--muted2);font-size:16px}

  /* eval locked field */
  .eval-title{font-size:17px;font-weight:800;color:var(--ink-strong);padding-bottom:12px;border-bottom:1px solid var(--line2);margin:0 0 16px}
  .eval-opt{background:var(--field-bg);border:1px solid var(--line);border-radius:6px;padding:12px 16px;margin:8px 0;color:#6b7075;font-weight:500}
  .eval-note{font-size:12.5px;color:var(--muted);margin-top:10px}
  .eval-opt.click{cursor:pointer;color:var(--ink)}
  .eval-opt.click:hover{border-color:var(--brand)}
  .eval-opt.sel{background:var(--brand);border-color:var(--brand);color:#fff}

  /* question builder row */
  .q-label-input{width:calc(100% - 90px);border:0;border-bottom:1px solid var(--line2);font-size:17px;font-weight:800;
                 color:var(--ink-strong);padding:2px 0 12px;background:transparent}
  .q-label-input:focus{outline:none;border-bottom-color:var(--brand)}
  .type-select{margin-top:14px;display:inline-flex;align-items:center;gap:6px;position:relative}
  .type-select select{appearance:none;border:0;background:transparent;font:inherit;font-size:12px;font-weight:700;
        letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:4px 22px 4px 0;cursor:pointer}
  .type-select::after{content:"⌄";position:absolute;right:4px;top:2px;color:var(--muted);pointer-events:none}
  .opts-edit{margin-top:14px}
  .opts-edit label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:block;margin-bottom:6px}
  .opts-edit textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:8px 10px;font:inherit;min-height:70px;resize:vertical}
  .score-edit{margin-top:14px;display:flex;gap:16px;flex-wrap:wrap}
  .score-edit label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:block;margin-bottom:4px}
  .score-edit input{width:90px;border:1px solid var(--line);border-radius:6px;padding:7px 9px;font:inherit}

  /* kebab menu popover */
  .menu{position:absolute;top:52px;right:18px;background:#fff;border:1px solid var(--line);border-radius:8px;
        box-shadow:0 6px 20px rgba(0,0,0,.14);min-width:180px;z-index:20;overflow:hidden}
  .menu button{display:flex;width:100%;gap:10px;align-items:center;border:0;background:#fff;padding:10px 14px;font:inherit;
        font-size:14px;text-align:left;cursor:pointer;color:var(--ink)}
  .menu button:hover{background:#f5f6f8}
  .menu button.danger{color:var(--red)}
  .menu .sep{height:1px;background:var(--line2)}
  .menu .chk{margin-left:auto;color:var(--brand);font-weight:800}

  /* add another question */
  .add-q{width:100%;border:1px solid var(--line);background:#fff;border-radius:var(--radius);padding:16px;font:inherit;
         font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);cursor:pointer;font-size:13px;
         display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:var(--shadow)}
  .add-q:hover{background:#fafafa;border-color:var(--muted2)}

  /* fill-mode inputs */
  .field-label{font-size:15px;font-weight:700;color:var(--ink-strong);display:block;margin-bottom:8px}
  .field-label .req{color:var(--red);margin-left:3px}
  .fill input[type=text],.fill input[type=date],.fill textarea,.fill select{
     width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;font:inherit;background:#fff;color:var(--ink)}
  .fill textarea{min-height:90px;resize:vertical}
  .fill input:focus,.fill textarea:focus,.fill select:focus{outline:2px solid #eef0ff;border-color:var(--brand)}
  .meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
  .rating{display:flex;gap:8px;flex-wrap:wrap}
  .rating input{position:absolute;opacity:0;width:0;height:0}
  .rating label{border:1px solid var(--line);border-radius:6px;padding:9px 15px;min-width:46px;text-align:center;cursor:pointer;font-weight:700}
  .rating input:checked + label{background:var(--brand);border-color:var(--brand);color:#fff}
  .pills{display:flex;gap:8px;flex-wrap:wrap}
  .pills input{position:absolute;opacity:0;width:0;height:0}
  .pills label{border:1px solid var(--line);border-radius:20px;padding:8px 18px;cursor:pointer;font-weight:600}
  .pills input:checked + label{background:var(--brand);border-color:var(--brand);color:#fff}
  .check-list label{display:flex;align-items:center;gap:9px;padding:5px 0;font-weight:500;cursor:pointer}

  .footer-bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);
              padding:14px 18px;display:flex;gap:12px;justify-content:flex-end;align-items:center;z-index:15}
  .footer-inner{max-width:940px;margin:0 auto;width:100%;display:flex;gap:12px;justify-content:flex-end;align-items:center}
  .score-chip{background:#eef0ff;color:var(--brand-dark);font-weight:700;border-radius:8px;padding:9px 15px;margin-right:auto}
  button.primary{background:var(--brand);border:1px solid var(--brand);color:#fff;padding:10px 20px;border-radius:8px;font:inherit;font-weight:700;cursor:pointer}
  button.primary:hover{background:var(--brand-dark)}
  button.ghost{background:#fff;border:1px solid var(--line);color:var(--ink);padding:10px 16px;border-radius:8px;font:inherit;font-weight:600;cursor:pointer}

  .dragging{opacity:.45}
  .drop-target{border-top:2px solid var(--brand)!important}
  .hidden{display:none!important}

  /* toast + modal */
  .toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#222;color:#fff;padding:12px 18px;
         border-radius:10px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:60;max-width:90vw;text-align:center}
  .toast.show{opacity:1}.toast.err{background:var(--red)}.toast.ok{background:var(--ok)}
  .modal{position:fixed;inset:0;background:rgba(20,20,25,.5);display:none;place-items:center;z-index:50;padding:16px}
  .modal.show{display:grid}
  .modal .card{max-width:560px;width:100%;margin:0;max-height:88vh;overflow:auto}
  .modal .card .field-label{margin-top:14px}
  .modal input[type=text],.modal textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:6px;font:inherit}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.row-2{grid-template-columns:1fr}.card{padding:20px 18px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="logo"><span class="badge">MB</span> <span id="brandName">MSBU</span></div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div class="tabs">
        <button id="tabEdit" class="active">Edit form</button>
        <button id="tabFill">Preview &amp; fill</button>
      </div>
      <button id="btnSettings" class="icon-btn">Settings</button>
    </div>
  </header>

  <div id="stage"></div>
</div>

<!-- Settings modal -->
<div class="modal" id="settingsModal">
  <div class="card">
    <h2 style="margin:0 0 4px">Settings</h2>
    <p class="hint" style="margin:0 0 8px">Recipients, backend, candidate fields, and the evaluation scale.</p>

    <label class="field-label">Email recipients (comma separated)</label>
    <input type="text" id="setRecipients" />

    <label class="field-label">Backend URL (Google Apps Script Web App)</label>
    <input type="text" id="setEndpoint" placeholder="https://script.google.com/macros/s/……/exec" />
    <p class="hint">Leave blank to fall back to Excel download + email draft.</p>

    <label class="field-label">Candidate detail fields (one per line — shown in Preview &amp; fill)</label>
    <textarea id="setMeta" placeholder="Candidate name*&#10;Position applied for*&#10;Interview stage&#10;Interviewer name*&#10;Interview date:date*"></textarea>
    <p class="hint">Add <code>*</code> for required, <code>:date</code> for a date picker. e.g. <code>Interview date:date*</code></p>

    <label class="field-label">Evaluation scale (one per line, <code>score | label</code>)</label>
    <textarea id="setEval" placeholder="4 | Strong Hire&#10;3 | Hire&#10;2 | No Hire&#10;1 | Strong No Hire"></textarea>

    <label class="field-label">Company / brand label</label>
    <input type="text" id="setBrand" />

    <div style="display:flex;gap:8px;justify-content:space-between;margin-top:18px;flex-wrap:wrap">
      <div style="display:flex;gap:8px">
        <button class="ghost" id="btnExportCfg">Export config</button>
        <button class="ghost" id="btnImportCfg">Import config</button>
        <button class="ghost" id="btnFactory" style="color:var(--red);border-color:#f5c6c3">Reset default</button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="ghost" data-close="settingsModal">Close</button>
        <button class="primary" id="setSave">Save</button>
      </div>
    </div>
    <input type="file" id="importFile" accept="application/json" class="hidden" />
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ======================================================================
   MSBU Hiring Manager Feedback Form  —  Lever-style inline builder
   • Edit form  : inline add / edit / delete / reorder questions + type dropdown
   • Preview & fill : answerable form -> POST to Apps Script (Sheet + email)
   ====================================================================== */

const STORE_KEY = "msbu_feedback_config_v2";
const uid = () => "id" + Math.random().toString(36).slice(2, 9);
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];

const TYPES = [
  {v:"paragraph", label:"Text (Paragraph)"},
  {v:"single",    label:"Text (Single line)"},
  {v:"score",     label:"Score"},
  {v:"yesno",     label:"Yes / No"},
  {v:"dropdown",  label:"Dropdown"},
  {v:"multiple",  label:"Multiple choice"},
  {v:"checkbox",  label:"Checkboxes"},
];
const typeLabel = v => (TYPES.find(t=>t.v===v)||{}).label || v;
const NEEDS_OPTS = t => ["dropdown","multiple","checkbox"].includes(t);
const IS_SCORE   = t => t==="score";

/* ---------------- default config (matches the Lever example) ---------------- */
function defaultConfig(){
  return {
    brand:"MSBU",
    title:"Hiring Manager Feedback Form",
    instructions:"This is an initial call to discover more about the candidate and assess for team fit.",
    recipients:"erika@msbukonsultan.id, hr@msbu.co.id, e@msbu.co.id",
    endpoint:"",
    meta:[
      {label:"Candidate name", required:true, type:"text"},
      {label:"Position applied for", required:true, type:"text"},
      {label:"Interview stage", required:false, type:"text"},
      {label:"Interviewer name", required:true, type:"text"},
      {label:"Interview date", required:true, type:"date"},
    ],
    evaluation:{
      label:"Your evaluation",
      options:[
        {score:4,label:"Strong Hire"},
        {score:3,label:"Hire"},
        {score:2,label:"No Hire"},
        {score:1,label:"Strong No Hire"},
      ]
    },
    questions:[
      {id:uid(), label:"Will this candidate raise the bar for the team?", type:"paragraph", required:false},
      {id:uid(), label:"Describe the most challenging project you've worked on.", type:"paragraph", required:false},
      {id:uid(), label:"Technical question #1", type:"paragraph", required:false},
      {id:uid(), label:"Technical question #2", type:"paragraph", required:false},
      {id:uid(), label:"What excites you about our team and why?", type:"single", required:false},
      {id:uid(), label:"Do you have any lingering questions for this candidate?", type:"paragraph", required:false},
      {id:uid(), label:"General comments", type:"paragraph", required:false},
    ]
  };
}

let cfg = load();
let mode = "edit";          // "edit" | "fill"
let openMenuFor = null;     // question id whose kebab menu is open

function load(){ try{ const r=localStorage.getItem(STORE_KEY); if(r) return JSON.parse(r);}catch(e){} return defaultConfig(); }
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(cfg)); }
function toast(m,k=""){ const t=$("#toast"); t.textContent=m; t.className="toast show "+k; clearTimeout(toast._t); toast._t=setTimeout(()=>t.className="toast",2800); }
function esc(s){ return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ====================================================================
   RENDER
   ==================================================================== */
function render(){
  $("#brandName").textContent = cfg.brand;
  $("#tabEdit").classList.toggle("active", mode==="edit");
  $("#tabFill").classList.toggle("active", mode==="fill");
  mode==="edit" ? renderBuilder() : renderFill();
}

/* ---------------- BUILDER (edit form) ---------------- */
function renderBuilder(){
  const stage=$("#stage"); stage.className="";
  stage.innerHTML = `
    <div class="card">
      <input class="doc-title" id="docTitle" value="${esc(cfg.title)}" />
      <div class="hint">Instructions for interviewers</div>
      <textarea class="doc-instructions" id="docInstr" rows="1">${esc(cfg.instructions)}</textarea>
    </div>

    <div class="card eval">
      <div class="card-controls">
        <div class="ctrl-row"><span class="req-badge">*</span><span class="lock" title="Locked field">🔒</span></div>
      </div>
      <div class="eval-title">${esc(cfg.evaluation.label)}</div>
      ${cfg.evaluation.options.map(o=>`<div class="eval-opt">${o.score} - ${esc(o.label)}</div>`).join("")}
      <div class="eval-note">This is the overall score field and cannot be edited.</div>
    </div>

    <div id="qcards"></div>

    <button class="add-q" id="addQ">＋ Add another question</button>
  `;

  const host=$("#qcards");
  cfg.questions.forEach((q,i)=>host.appendChild(builderCard(q,i)));

  // wire top card
  $("#docTitle").addEventListener("input",e=>{ cfg.title=e.target.value; save(); });
  const instr=$("#docInstr");
  autoGrow(instr); instr.addEventListener("input",e=>{ cfg.instructions=e.target.value; autoGrow(instr); save(); });
  $("#addQ").addEventListener("click",addQuestion);
}

function builderCard(q,idx){
  const card=document.createElement("div");
  card.className="card q-card"; card.dataset.idx=idx; card.dataset.id=q.id;
  card.innerHTML = `
    <div class="card-controls">
      <button class="kebab" data-kebab="${q.id}" title="More">⋯</button>
      <div class="ctrl-row">
        <span class="grip" title="Drag to reorder" draggable="true">⠿</span>
      </div>
      <div class="ctrl-row">
        <button class="arrow" data-up="${idx}" title="Move up">↑</button>
      </div>
      <div class="ctrl-row">
        <button class="arrow" data-down="${idx}" title="Move down">↓</button>
      </div>
    </div>

    <input class="q-label-input" data-label="${q.id}" value="${esc(q.label)}" placeholder="Type your question ..." />

    <div class="type-select">
      <select data-type="${q.id}">
        ${TYPES.map(t=>`<option value="${t.v}" ${t.v===q.type?"selected":""}>${t.label}</option>`).join("")}
      </select>
    </div>

    ${IS_SCORE(q.type)?`
      <div class="score-edit">
        <div><label>Max score</label><input type="number" min="2" max="10" value="${q.scale||5}" data-scale="${q.id}"></div>
        <div><label>Weight</label><input type="number" min="0" max="10" step="0.5" value="${q.weight||1}" data-weight="${q.id}"></div>
      </div>`:""}

    ${NEEDS_OPTS(q.type)?`
      <div class="opts-edit">
        <label>Options (one per line)</label>
        <textarea data-opts="${q.id}" placeholder="Option A&#10;Option B">${esc((q.options||[]).join("\n"))}</textarea>
      </div>`:""}

    ${q.required?`<div class="hint" style="margin-top:12px;color:var(--red)">Required</div>`:""}

    ${openMenuFor===q.id?kebabMenu(q):""}
  `;
  return card;
}

function kebabMenu(q){
  return `<div class="menu" data-menu="${q.id}">
    <button data-act="require" data-id="${q.id}">Required ${q.required?'<span class="chk">✓</span>':''}</button>
    <button data-act="duplicate" data-id="${q.id}">Duplicate</button>
    <div class="sep"></div>
    <button class="danger" data-act="delete" data-id="${q.id}">Delete question</button>
  </div>`;
}

/* ---------------- FILL (preview & answer) ---------------- */
function renderFill(){
  const stage=$("#stage"); stage.className="fill";
  const metaHtml = cfg.meta.map(m=>`
    <div>
      <label class="field-label">${esc(m.label)}${m.required?'<span class="req">*</span>':''}</label>
      <input type="${m.type==='date'?'date':'text'}" data-meta="${esc(m.label)}" />
    </div>`).join("");

  const evalHtml = cfg.evaluation.options.map((o,i)=>`
    <div class="eval-opt click" data-evalpick="${o.score}|${esc(o.label)}">${o.score} - ${esc(o.label)}</div>`).join("");

  stage.innerHTML = `
    <div class="card">
      <h1 class="q-title-static" style="font-size:24px">${esc(cfg.title)}</h1>
      <p class="instr-static">${esc(cfg.instructions)}</p>
    </div>

    <div class="card">
      <div class="q-title-static">Candidate details</div>
      <div class="meta-grid">${metaHtml}</div>
    </div>

    <div class="card">
      <div class="q-title-static">${esc(cfg.evaluation.label)} <span class="req" style="color:var(--red)">*</span></div>
      <div id="evalPick">${evalHtml}</div>
      <input type="hidden" id="evalValue" />
    </div>

    <div id="fillQuestions"></div>
  `;

  const fq=$("#fillQuestions");
  cfg.questions.forEach(q=>fq.appendChild(fillCard(q)));

  // eval picker
  $$("#evalPick .eval-opt").forEach(el=>el.addEventListener("click",()=>{
    $$("#evalPick .eval-opt").forEach(x=>x.classList.remove("sel"));
    el.classList.add("sel"); $("#evalValue").value=el.dataset.evalpick; updateScore();
  }));

  ensureFooter();
  updateScore();
}

function fillCard(q){
  const c=document.createElement("div"); c.className="card";
  const name="q_"+q.id; let control="";
  if(q.type==="paragraph") control=`<textarea data-q="${q.id}" placeholder="Type your answer…"></textarea>`;
  else if(q.type==="single") control=`<input type="text" data-q="${q.id}" />`;
  else if(q.type==="score"){ const s=q.scale||5; let p=""; for(let n=1;n<=s;n++) p+=`<input type="radio" id="${name}_${n}" name="${name}" value="${n}" data-q="${q.id}" data-weight="${q.weight||1}" class="scoreInput"><label for="${name}_${n}">${n}</label>`; control=`<div class="rating">${p}</div>`; }
  else if(q.type==="yesno") control=`<div class="pills"><input type="radio" id="${name}_y" name="${name}" value="Yes" data-q="${q.id}"><label for="${name}_y">Yes</label><input type="radio" id="${name}_n" name="${name}" value="No" data-q="${q.id}"><label for="${name}_n">No</label></div>`;
  else if(q.type==="dropdown") control=`<select data-q="${q.id}"><option value="">— select —</option>${(q.options||[]).map(o=>`<option>${esc(o)}</option>`).join("")}</select>`;
  else if(q.type==="multiple") control=`<div class="pills">${(q.options||[]).map((o,i)=>`<input type="radio" id="${name}_${i}" name="${name}" value="${esc(o)}" data-q="${q.id}"><label for="${name}_${i}">${esc(o)}</label>`).join("")}</div>`;
  else if(q.type==="checkbox") control=`<div class="check-list">${(q.options||[]).map((o,i)=>`<label><input type="checkbox" data-q="${q.id}" value="${esc(o)}">${esc(o)}</label>`).join("")}</div>`;

  c.innerHTML = `<label class="field-label">${esc(q.label)}${q.required?'<span class="req">*</span>':''}${IS_SCORE(q.type)?` <span class="hint" style="display:inline">(1–${q.scale||5})</span>`:""}</label>${control}`;
  return c;
}

function ensureFooter(){
  if($("#footerBar")) return;
  const f=document.createElement("div"); f.className="footer-bar"; f.id="footerBar";
  f.innerHTML=`<div class="footer-inner">
      <span class="score-chip" id="scoreChip">Score: n/a</span>
      <button class="ghost" id="btnClear">Clear</button>
      <button class="primary" id="btnSubmit">Submit feedback</button>
    </div>`;
  document.body.appendChild(f);
  $("#btnSubmit").addEventListener("click",submitForm);
  $("#btnClear").addEventListener("click",()=>{ if(confirm("Clear all answers?")) renderFill(); });
}
function removeFooter(){ const f=$("#footerBar"); if(f) f.remove(); }

/* ====================================================================
   SCORING
   ==================================================================== */
function updateScore(){
  if(mode!=="fill"){ return; }
  let total=0,max=0;
  cfg.questions.forEach(q=>{ if(!IS_SCORE(q.type)) return; const w=+(q.weight||1),s=+(q.scale||5); max+=s*w;
    const sel=document.querySelector(`.scoreInput[data-q="${q.id}"]:checked`); if(sel) total+=(+sel.value)*w; });
  const chip=$("#scoreChip"); if(chip) chip.textContent = max>0?`Score: ${total} / ${max}`:"Score: n/a";
}
document.addEventListener("change",e=>{ if(e.target.classList&&e.target.classList.contains("scoreInput")) updateScore(); });

/* ====================================================================
   BUILDER ACTIONS
   ==================================================================== */
function addQuestion(){
  cfg.questions.push({id:uid(), label:"", type:"paragraph", required:false});
  save(); renderBuilder();
  const cards=$$("#qcards .q-card"); const last=cards[cards.length-1];
  if(last){ last.scrollIntoView({behavior:"smooth",block:"center"}); const inp=last.querySelector("[data-label]"); if(inp) inp.focus(); }
}

// live edits (labels, type, options, scale, weight, doc fields already wired)
document.addEventListener("input",e=>{
  const t=e.target;
  if(t.dataset.label!==undefined){ const q=byId(t.dataset.label); if(q){ q.label=t.value; save(); } }
  else if(t.dataset.opts!==undefined){ const q=byId(t.dataset.opts); if(q){ q.options=t.value.split("\n").map(s=>s.trim()).filter(Boolean); save(); } }
  else if(t.dataset.scale!==undefined){ const q=byId(t.dataset.scale); if(q){ q.scale=Math.max(2,+t.value||5); save(); } }
  else if(t.dataset.weight!==undefined){ const q=byId(t.dataset.weight); if(q){ q.weight=+t.value||1; save(); } }
});
document.addEventListener("change",e=>{
  const t=e.target;
  if(t.dataset.type!==undefined){ const q=byId(t.dataset.type); if(q){ q.type=t.value; if(NEEDS_OPTS(t.value)&&!q.options) q.options=["Option A","Option B"]; if(IS_SCORE(t.value)){ q.scale=q.scale||5; q.weight=q.weight||1;} save(); renderBuilder(); } }
});

// clicks: kebab, menu actions, reorder arrows
document.addEventListener("click",e=>{
  const t=e.target.closest("[data-kebab],[data-act],[data-up],[data-down],[data-close]");
  // close open menu if clicking elsewhere
  if(!e.target.closest(".menu") && !e.target.closest("[data-kebab]") && openMenuFor){ openMenuFor=null; renderBuilder(); }
  if(!t) return;
  if(t.dataset.close){ $("#"+t.dataset.close).classList.remove("show"); return; }
  if(t.dataset.kebab!==undefined){ openMenuFor = (openMenuFor===t.dataset.kebab)?null:t.dataset.kebab; renderBuilder(); return; }
  if(t.dataset.up!==undefined){ moveQ(+t.dataset.up,-1); return; }
  if(t.dataset.down!==undefined){ moveQ(+t.dataset.down,1); return; }
  if(t.dataset.act){
    const id=t.dataset.id, i=cfg.questions.findIndex(q=>q.id===id);
    if(i<0) return;
    if(t.dataset.act==="require"){ cfg.questions[i].required=!cfg.questions[i].required; }
    else if(t.dataset.act==="duplicate"){ const copy=JSON.parse(JSON.stringify(cfg.questions[i])); copy.id=uid(); cfg.questions.splice(i+1,0,copy); }
    else if(t.dataset.act==="delete"){ if(!confirm("Delete this question?")) return; cfg.questions.splice(i,1); }
    openMenuFor=null; save(); renderBuilder();
  }
});
function byId(id){ return cfg.questions.find(q=>q.id===id); }
function moveQ(idx,dir){ const a=cfg.questions,j=idx+dir; if(j<0||j>=a.length) return; [a[idx],a[j]]=[a[j],a[idx]]; save(); renderBuilder(); }

/* ---------- drag & drop reorder ---------- */
let dragIdx=null;
document.addEventListener("dragstart",e=>{ const g=e.target.closest(".grip"); if(!g) return; const card=g.closest(".q-card"); dragIdx=+card.dataset.idx; card.classList.add("dragging"); e.dataTransfer.effectAllowed="move"; });
document.addEventListener("dragend",e=>{ $$(".q-card").forEach(c=>c.classList.remove("dragging","drop-target")); dragIdx=null; });
document.addEventListener("dragover",e=>{ const card=e.target.closest(".q-card"); if(card&&dragIdx!=null){ e.preventDefault(); $$(".q-card").forEach(c=>c.classList.remove("drop-target")); card.classList.add("drop-target"); } });
document.addEventListener("drop",e=>{ const card=e.target.closest(".q-card"); if(card&&dragIdx!=null){ e.preventDefault(); const to=+card.dataset.idx; const a=cfg.questions; const [m]=a.splice(dragIdx,1); a.splice(to,0,m); dragIdx=null; save(); renderBuilder(); } });

function autoGrow(el){ el.style.height="auto"; el.style.height=(el.scrollHeight)+"px"; }

/* ====================================================================
   SUBMIT (fill mode)
   ==================================================================== */
function collect(){
  const data={meta:{},answers:[],recommendation:"",score:null,submittedAt:new Date().toISOString()};
  const missing=[];
  cfg.meta.forEach(m=>{ const el=document.querySelector(`[data-meta="${cssEsc(m.label)}"]`); const v=el?el.value.trim():""; data.meta[m.label]=v; if(m.required&&!v) missing.push(m.label); });

  const ev=$("#evalValue")?$("#evalValue").value:""; data.recommendation=ev?ev.split("|")[1]:""; data.evalScore=ev?+ev.split("|")[0]:null;
  if(!data.recommendation) missing.push(cfg.evaluation.label);

  let total=0,max=0;
  cfg.questions.forEach(q=>{
    let val="";
    if(q.type==="checkbox") val=$$(`input[type=checkbox][data-q="${q.id}"]:checked`).map(c=>c.value).join("; ");
    else if(IS_SCORE(q.type)||q.type==="yesno"||q.type==="multiple"){ const s=document.querySelector(`input[data-q="${q.id}"]:checked`); val=s?s.value:""; }
    else { const el=document.querySelector(`[data-q="${q.id}"]`); val=el?el.value.trim():""; }
    if(q.required&&!val) missing.push(q.label||"(untitled)");
    if(IS_SCORE(q.type)){ const w=+(q.weight||1),s=+(q.scale||5); max+=s*w; if(val) total+=(+val)*w; }
    data.answers.push({section:"", question:q.label, type:q.type, value:val});
  });
  data.score = max>0?{total,max,percent:Math.round(total/max*100)}:null;
  return {data,missing};
}
function cssEsc(s){ return String(s).replace(/"/g,'\\"'); }

async function submitForm(){
  const {data,missing}=collect();
  if(missing.length){ toast("Please complete: "+missing.slice(0,3).join(", ")+(missing.length>3?` +${missing.length-3} more`:""),"err"); return; }
  const payload={...data, formTitle:cfg.title, recipients:cfg.recipients.split(",").map(s=>s.trim()).filter(Boolean)};

  if(cfg.endpoint){
    const b=$("#btnSubmit"); b.disabled=true; b.textContent="Submitting…";
    try{
      await fetch(cfg.endpoint,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
      toast("Submitted — saved to Google Sheet & emailed the team ✔","ok"); renderFill();
    }catch(err){ toast("Network error — downloading a backup copy","err"); downloadBackup(payload); }
    finally{ b.disabled=false; b.textContent="Submit feedback"; }
  } else {
    downloadBackup(payload); openMailDraft(payload);
    toast("No backend set — downloaded a file & opened an email draft. See README to enable auto Sheet+email.","");
  }
}
function downloadBackup(p){
  const rows=[["Field","Value"]];
  Object.entries(p.meta).forEach(([k,v])=>rows.push([k,v]));
  rows.push([cfg.evaluation.label,p.recommendation]);
  if(p.score) rows.push(["Score",`${p.score.total}/${p.score.max} (${p.score.percent}%)`]);
  p.answers.forEach(a=>rows.push([a.question,a.value]));
  rows.push(["Submitted at",p.submittedAt]);
  const csv=rows.map(r=>r.map(c=>`"${String(c??"").replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const first=p.meta[Object.keys(p.meta)[0]]||"candidate";
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`Feedback_${first.replace(/\W+/g,"_")}_${p.submittedAt.slice(0,10)}.csv`; a.click();
}
function openMailDraft(p){
  const lines=[]; Object.entries(p.meta).forEach(([k,v])=>lines.push(`${k}: ${v}`));
  lines.push(`${cfg.evaluation.label}: ${p.recommendation}`);
  if(p.score) lines.push(`Score: ${p.score.total}/${p.score.max} (${p.score.percent}%)`);
  lines.push(""); p.answers.forEach(a=>{ if(a.value) lines.push(`• ${a.question}: ${a.value}`); });
  const subj=`Interview feedback — ${p.meta[Object.keys(p.meta)[0]]||""}`;
  window.open(`mailto:${encodeURIComponent(p.recipients.join(","))}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(lines.join("\n"))}`,"_blank");
}

/* ====================================================================
   TABS + SETTINGS
   ==================================================================== */
$("#tabEdit").addEventListener("click",()=>{ mode="edit"; removeFooter(); render(); });
$("#tabFill").addEventListener("click",()=>{ mode="fill"; render(); });

$("#btnSettings").addEventListener("click",()=>{
  $("#setRecipients").value=cfg.recipients;
  $("#setEndpoint").value=cfg.endpoint;
  $("#setBrand").value=cfg.brand;
  $("#setMeta").value=cfg.meta.map(m=>`${m.label}${m.type==="date"?":date":""}${m.required?"*":""}`).join("\n");
  $("#setEval").value=cfg.evaluation.options.map(o=>`${o.score} | ${o.label}`).join("\n");
  $("#settingsModal").classList.add("show");
});
$("#setSave").addEventListener("click",()=>{
  cfg.recipients=$("#setRecipients").value;
  cfg.endpoint=$("#setEndpoint").value.trim();
  cfg.brand=$("#setBrand").value.trim()||cfg.brand;
  const metaLines=$("#setMeta").value.split("\n").map(s=>s.trim()).filter(Boolean);
  if(metaLines.length) cfg.meta=metaLines.map(l=>{ const req=/\*/.test(l); const isDate=/:date/i.test(l); const label=l.replace(/:date/i,"").replace(/\*/g,"").trim(); return {label,required:req,type:isDate?"date":"text"}; });
  const evLines=$("#setEval").value.split("\n").map(s=>s.trim()).filter(Boolean);
  if(evLines.length) cfg.evaluation.options=evLines.map(l=>{ const [sc,...rest]=l.split("|"); return {score:parseInt(sc)||0,label:(rest.join("|")||"").trim()}; });
  save(); $("#settingsModal").classList.remove("show"); render(); toast("Settings saved","ok");
});
$("#btnExportCfg").addEventListener("click",()=>{ const b=new Blob([JSON.stringify(cfg,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="feedback-form-config.json"; a.click(); });
$("#btnImportCfg").addEventListener("click",()=>$("#importFile").click());
$("#importFile").addEventListener("change",ev=>{ const f=ev.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{ cfg=JSON.parse(r.result); save(); $("#settingsModal").classList.remove("show"); render(); toast("Config imported","ok"); }catch(e){ toast("Invalid JSON","err"); } }; r.readAsText(f); });
$("#btnFactory").addEventListener("click",()=>{ if(confirm("Reset the entire form to default?")){ cfg=defaultConfig(); save(); $("#settingsModal").classList.remove("show"); render(); } });
$$(".modal").forEach(m=>m.addEventListener("click",e=>{ if(e.target===m) m.classList.remove("show"); }));

render();
</script>
